<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="description" content="Arvind Ad Studio provides professional logo design, poster design, banner design and advertising services for businesses.">

<meta name="keywords" content="logo design, advertisement design, banner design, poster design, advertising agency">

<meta name="author" content="Arvind Ad Studio">
<title>Arvind Ad Studio — Premium Form</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#0ff;
--primary-dark:#06f;
--bg:#0a0f1e;
--card:#1a1f33;
--text:#e6eef6;
--muted:#94a3b8;
--shadow:0 20px 60px rgba(0,255,255,0.7);
}

*{box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
margin:0;
background:var(--bg);
min-height:100vh;
padding:30px;
color:var(--text);
}

.container{
max-width:700px;
margin:auto;
}

header{
display:flex;
align-items:center;
gap:20px;
margin-bottom:30px;
}

header h1{
margin:0;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:15px;
box-shadow:var(--shadow);
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
color:var(--muted);
}

input,select,textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #444;
background:#111;
color:#fff;
}

textarea{
min-height:120px;
}

button{
margin-top:20px;
background:var(--primary);
border:0;
padding:14px 18px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:var(--primary-dark);
}

.small{
margin-left:10px;
background:#555;
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>Arvind Ad Studio</h1>
</header>

<div class="card">

<form action="https://formsubmit.co/artofadvertisement7@gmail.com" method="POST">

<!-- FormSubmit settings -->
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="New Advertisement Client Request">

<label>Name</label>
<input type="text" name="Name" placeholder="e.g. Arvind" required>

<label>E-Mail</label>
<input type="email" name="email" placeholder="e.g. client@gmail.com" required>

<label>Business Name</label>
<input type="text" name="Business Name" placeholder="e.g. Arvind Electronics" required>

<label>Phone Number</label>
<input type="text" name="Phone Number" placeholder="+91 98XXXXXXXX" required>

<label>Business Type</label>
<select name="Business Type">
<option>Retail / Shop</option>
<option>Restaurant / Cafe</option>
<option>Service (Plumber, Electrician)</option>
<option>Health / Clinic</option>
<option>Education / Coaching</option>
<option>Other</option>
</select>

<label>Advertisement Type</label>
<select name="Advertisement Type">
<option>Poster</option>
<option>Banner</option>
<option>Logo</option>
</select>

<label>Short Details / Tagline</label>
<textarea name="Details" placeholder="Describe the business in 1-2 lines"></textarea>

<label>Primary Color</label>
<input type="color" name="Primary Color" value="#00ffff">

<button type="submit">Submit Info</button>

</form>

</div>

</div>

</body>
</html>
